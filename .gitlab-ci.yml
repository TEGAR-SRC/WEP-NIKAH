image: docker:latest

services:
  - docker:dind

stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

build:
  stage: build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - main

deploy:
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        docker pull $IMAGE_TAG &&
        docker stop wep-nikah || true &&
        docker rm wep-nikah || true &&
        docker run -d --name wep-nikah --restart always
          -p 3000:3000
          -e DATABASE_URL='$DATABASE_URL'
          -e NEXT_PUBLIC_BASE_URL='$NEXT_PUBLIC_BASE_URL'
          -e NEXT_PUBLIC_TURNSTILE_SITE_KEY='$NEXT_PUBLIC_TURNSTILE_SITE_KEY'
          -e TURNSTILE_SECRET_KEY='$TURNSTILE_SECRET_KEY'
          -e R2_ENDPOINT='$R2_ENDPOINT'
          -e R2_ACCESS_KEY_ID='$R2_ACCESS_KEY_ID'
          -e R2_SECRET_ACCESS_KEY='$R2_SECRET_ACCESS_KEY'
          -e R2_BUCKET='$R2_BUCKET'
          -e R2_PREFIX='$R2_PREFIX'
          $IMAGE_TAG
      "
  only:
    - main
