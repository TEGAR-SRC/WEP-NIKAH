version: "3.9"

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: xxken
      POSTGRES_PASSWORD: xxkenxyz
      POSTGRES_DB: nikah
    ports:
      - "35432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xxken -d nikah"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://xxken:xxkenxyz@db:5432/nikah?sslmode=disable"
      NEXT_PUBLIC_BASE_URL: "https://nikah.tegar-src.xyz"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "0x4AAAAAAD1y3NUBp29qqdA6"
      TURNSTILE_SECRET_KEY: "0x4AAAAAAD1y3CauCvqRFU0QgaQAZHGTEJY"
      R2_ENDPOINT: "https://b09d0a9768ae1cb2f77fea7135fd637d.r2.cloudflarestorage.com"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY}"
      R2_BUCKET: "nikah"
      R2_PREFIX: "public"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
